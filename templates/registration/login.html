{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — GaussDB 运维系统</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="brand">GaussDB 运维系统</div>
  </header>
  <main class="container" style="max-width:420px;">
    <div class="card">
      <h1>登录</h1>
      {% if form.errors %}
      <p class="muted">用户名或密码错误。</p>
      {% endif %}
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-row">
          <label for="id_username">用户名</label>
          <input type="text" name="username" id="id_username" autofocus required>
        </div>
        <div class="form-row">
          <label for="id_password">密码</label>
          <input type="password" name="password" id="id_password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn">进入系统</button>
      </form>
    </div>
  </main>
</body>
</html>
